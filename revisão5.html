<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        let dados = [2, 5, 2, 7, 2, 9];
        let alvo = 2;
        let contador = 0;

        for (let i = 0; i < dados.length; i++) {
            if (dados[i] === alvo) {
                contador++;
            }

        }
        
        if (contador == 0)
            console.log("valor " + alvo + " não encontrado");
        else
            if (contador == 1)
                console.log("valor " + alvo + " encontrado 1 vez");
            else
                console.log("valor " + alvo + " encontrado " + contador + " vezes");
    </script>
</head>

</body>
</html>
